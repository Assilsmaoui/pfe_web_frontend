<div class="main-content-add-project">
  <div class="form-container">
    <div class="form-card">

      <div class="form-header">
        <button (click)="retour()" class="btn-back" type="button">
          <span class="icon">←</span> Retour
        </button>

        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="9"></line>
            <line x1="9" y1="13" x2="15" y2="13"></line>
            <line x1="9" y1="17" x2="11" y2="17"></line>
          </svg>
        </div>

        <div class="header-text">
          <h2>{{ isEditMode ? 'Modifier Projet' : 'Nouveau Projet' }}</h2>
          <p>Configurez les détails, les dates et l'équipe assignée.</p>
        </div>
      </div>

      <!-- 🔥 IMPORTANT: submitProjet() pour CREATE + UPDATE -->
      <form (ngSubmit)="submitProjet()" class="professional-form">

        <div class="form-group full-width">
          <label>Nom du projet</label>
          <input
            [(ngModel)]="newProjet.nom_projet"
            name="nom_projet"
            placeholder="ex: Refonte Site E-commerce"
            required
          />
        </div>

        <div class="form-group full-width">
          <label>Description du projet</label>
          <textarea
            [(ngModel)]="newProjet.description"
            name="description"
            placeholder="Objectifs et périmètre du projet..."
            rows="3"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Date de début</label>
            <input
              type="date"
              [(ngModel)]="newProjet.date_debut"
              name="date_debut"
            />
          </div>

          <div class="form-group">
            <label>Date de fin (Échéance)</label>
            <input
              type="date"
              [(ngModel)]="newProjet.date_fin"
              name="date_fin"
            />
          </div>
        </div>

        <div class="form-group full-width">
          <label>Statut initial</label>
          <select
            [(ngModel)]="newProjet.statut"
            name="statut"
            class="custom-select"
          >
            <option value="En cours">En cours</option>
            <option value="Planifié">Planifié</option>
            <option value="En attente">En attente</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label>Membres de l'équipe (Sélection multiple)</label>
          <p class="select-hint">
            Maintenez Ctrl (ou Cmd) pour choisir plusieurs personnes
          </p>

          <select
            multiple
            [(ngModel)]="newProjet.membres"
            name="membres"
            class="multi-select"
          >
            <option *ngFor="let user of users" [value]="user._id">
              {{ user.username }} — {{ user.domaine || 'Sans domaine' }}
            </option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="annuler()">
            Annuler
          </button>

          <button type="submit" class="btn-submit">
            {{ isEditMode ? 'Modifier le projet' : 'Créer le projet' }}
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
